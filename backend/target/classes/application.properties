# Carga .env local (opcional)
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/helpdesk_db
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.mail=DEBUG

# --- Correo Brevo / SMTP ---
spring.mail.host=${BREVO_SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${BREVO_SMTP_PORT:587}
spring.mail.username=${BREVO_SMTP_USER:}
spring.mail.password=${BREVO_SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.from=${BREVO_MAIL_FROM:${BREVO_SMTP_USER:}}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- Recuperación de contraseña ---
app.mail.from=${BREVO_MAIL_FROM:no-reply@helpdesk.local}
app.reset.base-url=${APP_RESET_URL:http://localhost:5173/reset-password}
app.reset.minutes-valid=${APP_RESET_MINUTES:30}

# --- Archivos adjuntos ---
app.attachments.dir=${APP_ATTACHMENTS_DIR:../../attachments}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
